<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console Control Matrix | Enterprise Content Management System</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .editor-btn { @apply p-2 text-slate-400 hover:text-emerald-400 hover:bg-slate-800 rounded-lg transition duration-150 text-sm font-medium min-w-[36px] h-9 flex items-center justify-center; }
        .editor-btn.active { @apply text-emerald-400 bg-slate-800 border border-emerald-500/20; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased min-h-screen flex flex-col">

    <div id="security-lock-screen" class="fixed inset-0 bg-slate-950 z-[9999] flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-md rounded-2xl p-6 md:p-8 shadow-2xl space-y-5 text-center">
            <div class="space-y-2">
                <div class="w-16 h-16 bg-emerald-950 text-emerald-400 border border-emerald-500/20 rounded-2xl flex items-center justify-center text-2xl mx-auto shadow-xl">
                    <i class="fa-solid fa-vault"></i>
                </div>
                <h2 class="text-xl font-black tracking-tight text-white pt-2">Console Security Authorization</h2>
                <p class="text-xs text-slate-400">Authenticate your credentials to manage cloud data nodes.</p>
            </div>
            <div class="space-y-4 text-left">
                <div class="space-y-1.5">
                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Admin Email</label>
                    <input type="email" id="security-email" placeholder="admin@email.com" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500 text-sm">
                </div>
                <div class="space-y-1.5">
                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Password</label>
                    <input type="password" id="security-password" placeholder="••••••••" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500 text-sm">
                </div>
                <div id="security-error-msg" class="text-xs text-red-400 font-semibold hidden flex items-center"><i class="fa-solid fa-triangle-exclamation mr-1.5"></i> Invalid Credentials. Access Denied.</div>
                <button onclick="verifyAccessAuthentication()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-bold py-3 px-4 rounded-xl shadow-lg shadow-emerald-950 transition duration-150 flex items-center justify-center">
                    Verify Identity <i class="fa-solid fa-shield-halved ml-2 text-xs"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="dashboard-app-workspace" class="hidden flex-1 flex flex-col">
        <header class="bg-slate-900 border-b border-slate-800 px-4 sm:px-6 py-4 flex items-center justify-between sticky top-0 z-50">
            <div class="flex items-center space-x-3">
                <div class="bg-emerald-600 p-2 rounded-xl text-white shadow-md shadow-emerald-950"><i class="fa-solid fa-gauge-high text-lg"></i></div>
                <div>
                    <h1 class="text-base font-bold tracking-tight text-white">SEO Compliance Engine</h1>
                    <p class="text-xs text-slate-400">Environment Node: <span class="text-emerald-400 font-mono">Independent Cluster</span></p>
                </div>
            </div>
            <div class="flex items-center space-x-3">
                <a href="index.html" target="_blank" class="bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs sm:text-sm font-semibold px-4 py-2 rounded-xl transition flex items-center"><i class="fa-solid fa-globe mr-1.5"></i> Live Site</a>
                <button onclick="terminateSessionLogout()" class="text-slate-400 hover:text-red-400 text-xs font-bold transition flex items-center bg-slate-950/40 border border-slate-800 px-3 py-2 rounded-xl"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 grid lg:grid-cols-3 gap-8 w-full flex-1">
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 md:p-6 space-y-5 shadow-xl">
                    <div class="flex items-center justify-between border-b border-slate-800 pb-3">
                        <h2 id="editor-panel-title" class="text-lg font-black tracking-tight text-white flex items-center text-emerald-400"><i class="fa-solid fa-square-plus mr-2"></i> Compose New Article</h2>
                        <button id="cancel-edit-btn" onclick="resetEditorState()" class="hidden text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold px-3 py-1.5 rounded-lg border border-slate-700 transition">Cancel Edit</button>
                    </div>

                    <input type="hidden" id="edit-post-id" value="">
                    
                    <div class="space-y-1.5">
                        <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Article Headline / Title</label>
                        <input type="text" id="post-title" onkeyup="autoGenerateSEOSlug()" placeholder="e.g., Implementing Automated ZATCA Validation Frameworks" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white font-medium focus:outline-none focus:border-emerald-500 text-sm">
                    </div>

                    <div class="grid md:grid-cols-3 gap-4">
                        <div class="space-y-1.5">
                            <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Category Routing</label>
                            <select id="post-category" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-3 text-white focus:outline-none focus:border-emerald-500 text-sm">
                                <option value="ZATCA Compliance">ZATCA Compliance</option>
                                <option value="Regulations">Regulations</option>
                                <option value="Tax Advisory">Tax Advisory</option>
                                <option value="System Integration">System Integration</option>
                            </select>
                        </div>
                        <div class="space-y-1.5 md:col-span-2">
                            <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">SEO Target Permanent URL Slug</label>
                            <input type="text" id="post-slug" placeholder="zatca-phase-2-integration-guide" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-400 font-mono text-xs focus:outline-none focus:border-emerald-500">
                        </div>
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Meta Description Summary Snippet</label>
                        <textarea id="post-summary" rows="2" placeholder="Search snippet text constructed to enhance click-through performance indexing charts..." class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-white placeholder-slate-700 focus:outline-none focus:border-emerald-500 text-sm resize-none"></textarea>
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Rich Text Content Core Body</label>
                        <div class="bg-slate-950 border border-slate-800 rounded-xl overflow-hidden focus-within:border-emerald-500 transition">
                            <div class="bg-slate-900 border-b border-slate-800 p-1.5 flex flex-wrap gap-1 items-center">
                                <button type="button" onclick="execCmd('bold')" class="editor-btn"><i class="fa-solid fa-bold"></i></button>
                                <button type="button" onclick="execCmd('italic')" class="editor-btn"><i class="fa-solid fa-italic"></i></button>
                                <button type="button" onclick="execCmd('underline')" class="editor-btn"><i class="fa-solid fa-underline"></i></button>
                                <div class="w-[1px] h-5 bg-slate-800 mx-1"></div>
                                <button type="button" onclick="execCmd('formatBlock', '<h3>')" class="editor-btn text-xs font-bold">H3</button>
                                <button type="button" onclick="execCmd('formatBlock', '<h4>')" class="editor-btn text-xs font-bold">H4</button>
                                <button type="button" onclick="execCmd('formatBlock', '<p>')" class="editor-btn text-xs">P</button>
                                <div class="w-[1px] h-5 bg-slate-800 mx-1"></div>
                                <button type="button" onclick="execCmd('justifyLeft')" class="editor-btn"><i class="fa-solid fa-align-left"></i></button>
                                <button type="button" onclick="execCmd('justifyCenter')" class="editor-btn"><i class="fa-solid fa-align-center"></i></button>
                                <button type="button" onclick="execCmd('justifyRight')" class="editor-btn"><i class="fa-solid fa-align-right"></i></button>
                                <button type="button" onclick="execCmd('justifyFull')" class="editor-btn"><i class="fa-solid fa-align-justify"></i></button>
                                <div class="w-[1px] h-5 bg-slate-800 mx-1"></div>
                                <button type="button" onclick="insertLinkPrompt()" class="editor-btn"><i class="fa-solid fa-link"></i></button>
                                <button type="button" onclick="execCmd('unlink')" class="editor-btn"><i class="fa-solid fa-link-slash"></i></button>
                                <button type="button" onclick="execCmd('removeFormat')" class="editor-btn text-red-400"><i class="fa-solid fa-eraser"></i></button>
                            </div>
                            <div id="wysiwyg-editor-viewport" contenteditable="true" class="w-full min-h-[320px] max-h-[500px] overflow-y-auto px-4 py-4 text-white focus:outline-none text-base bg-slate-950 leading-relaxed space-y-4">
                                <p>Write your article here...</p>
                            </div>
                        </div>
                    </div>

                    <div class="pt-2">
                        <button onclick="processSubmitAction()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg transition flex items-center justify-center">
                            <i id="submit-btn-icon" class="fa-solid fa-square-check mr-2"></i> <span id="submit-btn-text">Save Article Content to Firestore</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-xl flex flex-col max-h-[620px]">
                    <div class="border-b border-slate-800 pb-3 mb-4 flex items-center justify-between">
                        <h3 class="text-sm font-extrabold tracking-tight text-slate-200 flex items-center"><i class="fa-solid fa-folder-tree mr-2 text-emerald-400"></i> Indexed Feed Archive</h3>
                        <span id="post-counter-badge" class="bg-slate-950 text-slate-400 font-mono text-[10px] px-2 py-0.5 rounded-full border border-slate-800">0 Posts</span>
                    </div>
                    <div id="admin-posts-container" class="space-y-3 overflow-y-auto flex-1 pr-1">
                        </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, setDoc, doc, deleteDoc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDTbAZ1-8IQdNESIZ0Sg9Si3bGD0jL5D-M",
            authDomain: "saudi-einvoicing-insights.firebaseapp.com",
            projectId: "saudi-einvoicing-insights",
            storageBucket: "saudi-einvoicing-insights.firebasestorage.app",
            messagingSenderId: "229055730751",
            appId: "1:229055730751:web:003941a6465e368c31948a",
            measurementId: "G-92M22ZP5JH"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('security-lock-screen').classList.add('hidden');
                document.getElementById('dashboard-app-workspace').classList.remove('hidden');
                initializeAdminDashboardEnvironment();
            } else {
                document.getElementById('dashboard-app-workspace').classList.add('hidden');
                document.getElementById('security-lock-screen').classList.remove('hidden');
            }
        });

        window.verifyAccessAuthentication = async function() {
            const email = document.getElementById('security-email').value.trim();
            const password = document.getElementById('security-password').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                const errElement = document.getElementById('security-error-msg');
                errElement.classList.remove('hidden');
                setTimeout(() => { errElement.classList.add('hidden'); }, 4000);
            }
        };

        window.terminateSessionLogout = async function() {
            await signOut(auth);
        };

        async function dbFetchPosts() {
            try {
                const blogCollectionRef = collection(db, "posts");
                const q = query(blogCollectionRef, orderBy("id", "desc"));
                const querySnapshot = await getDocs(q);
                const posts = [];
                querySnapshot.forEach((doc) => { posts.push(doc.data()); });
                return posts;
            } catch (err) {
                return [];
            }
        }

        async function dbWritePost(postObj) {
            try {
                const docRef = doc(db, "posts", String(postObj.id));
                await setDoc(docRef, postObj);
                return true;
            } catch (err) {
                alert("Permission Interrupted: Double-check your Cloud Firestore rules.");
                return false;
            }
        }

        async function dbDeletePost(postId) {
            try {
                const docRef = doc(db, "posts", String(postId));
                await deleteDoc(docRef);
                return true;
            } catch (err) {
                return false;
            }
        }

        window.execCmd = function(command, val = null) {
            document.execCommand(command, false, val);
            document.getElementById('wysiwyg-editor-viewport').focus();
        };

        window.insertLinkPrompt = function() {
            const linkUrl = prompt("Enter hyperlink URL:");
            if (linkUrl) execCmd('createLink', linkUrl);
        };

        window.autoGenerateSEOSlug = function() {
            const headlineText = document.getElementById('post-title').value;
            const processSlug = headlineText.toLowerCase()
                .replace(/[^a-z0-9\s-]/g, '')
                .replace(/\s+/g, '-')
                .replace(/-+/g, '-');
            document.getElementById('post-slug').value = processSlug;
        };

        async function renderDashboardFeedList() {
            const dataArray = await dbFetchPosts();
            const containerNode = document.getElementById('admin-posts-container');
            const counterBadge = document.getElementById('post-counter-badge');
            
            containerNode.innerHTML = '';
            counterBadge.innerText = `${dataArray.length} Posts`;

            if(dataArray.length === 0) {
                containerNode.innerHTML = `<p class="text-xs text-slate-500 text-center py-6">No articles currently in cloud database node.</p>`;
                return;
            }

            dataArray.forEach(post => {
                containerNode.innerHTML += `
                    <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 flex items-start justify-between gap-4 shadow-sm">
                        <div class="space-y-1 min-w-0">
                            <h4 class="text-xs font-bold text-white tracking-tight truncate">${post.title}</h4>
                            <p class="text-[10px] text-slate-500 font-mono"><i class="fa-solid fa-bookmark text-emerald-500"></i> ${post.category}</p>
                        </div>
                        <div class="flex items-center space-x-1.5 shrink-0">
                            <button onclick="loadPostIntoEditorField(${post.id})" class="text-slate-400 hover:text-blue-400 p-1.5 bg-slate-900 border border-slate-800 rounded-md text-xs"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button onclick="executeTargetRemovalSequence(${post.id})" class="text-slate-400 hover:text-red-400 p-1.5 bg-slate-900 border border-slate-800 rounded-md text-xs"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>`;
            });
        }

        window.processSubmitAction = async function() {
            const targetIdValue = document.getElementById('edit-post-id').value;
            const title = document.getElementById('post-title').value.trim();
            const category = document.getElementById('post-category').value;
            const summary = document.getElementById('post-summary').value.trim();
            const content = document.getElementById('wysiwyg-editor-viewport').innerHTML;

            if(!title || !summary || content === '<p><br></p>' || content === '') {
                alert('Please enter all content variables.');
                return;
            }

            const formatOptions = { year: 'numeric', month: 'long', day: 'numeric' };
            const stampDate = new Date().toLocaleDateString('en-US', formatOptions);

            const itemPayload = {
                id: targetIdValue ? Number(targetIdValue) : Date.now(),
                title,
                category,
                date: stampDate,
                summary,
                content
            };

            const operationSuccess = await dbWritePost(itemPayload);
            if(operationSuccess) {
                resetEditorState();
                await renderDashboardFeedList();
                alert('Success: Database structural token updated.');
            }
        };

        window.loadPostIntoEditorField = async function(id) {
            const collectionData = await dbFetchPosts();
            const objective = collectionData.find(p => p.id == id);
            
            if(objective) {
                document.getElementById('edit-post-id').value = objective.id;
                document.getElementById('post-title').value = objective.title;
                document.getElementById('post-category').value = objective.category;
                document.getElementById('post-summary').value = objective.summary;
                document.getElementById('wysiwyg-editor-viewport').innerHTML = objective.content;
                autoGenerateSEOSlug();

                document.getElementById('editor-panel-title').innerHTML = `<i class="fa-solid fa-file-pen mr-2 text-blue-400"></i> Edit Article Mode`;
                document.getElementById('submit-btn-text').innerText = "Apply Cloud Updates to Document";
                document.getElementById('submit-btn-icon').className = "fa-solid fa-file-shield mr-2";
                document.getElementById('cancel-edit-btn').classList.remove('hidden');
                window.scrollTo({top: 0, behavior: 'smooth'});
            }
        };

        window.executeTargetRemovalSequence = async function(id) {
            if(confirm('Are you sure you want to delete this article from Firestore?')) {
                const clearSuccess = await dbDeletePost(id);
                if(clearSuccess) {
                    await renderDashboardFeedList();
                    if(document.getElementById('edit-post-id').value == id) resetEditorState();
                }
            }
        };

        window.resetEditorState = function() {
            document.getElementById('edit-post-id').value = '';
            document.getElementById('post-title').value = '';
            document.getElementById('post-summary').value = '';
            document.getElementById('post-slug').value = '';
            document.getElementById('wysiwyg-editor-viewport').innerHTML = '<p>Write your article here...</p>';
            
            document.getElementById('editor-panel-title').innerHTML = `<i class="fa-solid fa-square-plus mr-2 text-emerald-400"></i> Compose New Article`;
            document.getElementById('submit-btn-text').innerText = "Save Article Content to Firestore";
            document.getElementById('submit-btn-icon').className = "fa-solid fa-square-check mr-2";
            document.getElementById('cancel-edit-btn').classList.add('hidden');
        };

        function initializeAdminDashboardEnvironment() {
            renderDashboardFeedList();
            const viewport = document.getElementById('wysiwyg-editor-viewport');
            viewport.onfocus = function() {
                if(this.innerHTML.trim() === '<p>Write your article here...</p>') {
                    this.innerHTML = '<p><br></p>';
                }
            };
        }

        document.getElementById('security-password').addEventListener('keypress', function(e) {
            if(e.key === 'Enter') verifyAccessAuthentication();
        });
    </script>
</body>
</html>
