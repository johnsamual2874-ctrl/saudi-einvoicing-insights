<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insights Dashboard Central | Article Content Management Console</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased min-h-screen">

    <header class="bg-slate-950 border-b border-slate-800 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <div class="bg-emerald-600 p-2 rounded-lg text-white">
                <i class="fa-solid fa-user-gear text-lg"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold tracking-tight">Content Management System</h1>
                <p class="text-xs text-slate-400">Status: <span class="text-emerald-400 font-mono">Independent Blog</span></p>
            </div>
        </div>
        <a href="index.html" class="bg-slate-800 hover:bg-slate-700 text-slate-200 text-sm font-semibold px-4 py-2 rounded-xl transition flex items-center">
            <i class="fa-solid fa-eye mr-2"></i> View Live Site
        </a>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 grid lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-slate-950 border border-slate-800 rounded-2xl p-6 space-y-4 shadow-xl">
                <div class="flex items-center justify-between border-b border-slate-800 pb-3">
                    <h2 class="text-xl font-bold tracking-tight flex items-center text-emerald-400"><i class="fa-solid fa-pen-to-square mr-2"></i> Compose Article Blueprint</h2>
                </div>
                
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Article Headline Title</label>
                    <input type="text" id="post-title" placeholder="e.g., Implementing Automated ZATCA Validation Frameworks" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-white text-sm">
                </div>

                <div class="grid md:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Editorial Category Tag</label>
                        <select id="post-category" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-white text-sm">
                            <option value="ZATCA Compliance">ZATCA Compliance</option>
                            <option value="Regulations">Regulations</option>
                            <option value="Tax Advisory">Tax Advisory</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Publication Date</label>
                        <input type="text" id="post-date" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-white text-sm">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Search Engine Snippet Summary (SEO)</label>
                    <textarea id="post-summary" rows="2" placeholder="Brief high-impact teaser text..." class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-white text-sm resize-none"></textarea>
                </div>

                <div class="space-y-1">
                    <div class="flex items-center justify-between">
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Comprehensive Body Content</label>
                        <div class="flex space-x-2">
                            <button onclick="injectHTML('<strong>', '</strong>')" class="bg-slate-900 hover:bg-slate-800 px-2.5 py-1 rounded text-xs border border-slate-800 text-slate-300 font-mono"><b>B</b></button>
                            <button onclick="injectHTML('<h3>', '</h3>')" class="bg-slate-900 hover:bg-slate-800 px-2.5 py-1 rounded text-xs border border-slate-800 text-slate-300 font-mono">H3</button>
                            <button onclick="injectCustomLink()" class="bg-emerald-950 hover:bg-emerald-900 text-emerald-400 px-2.5 py-1 rounded text-xs border border-emerald-900/50 font-bold"><i class="fa-solid fa-link mr-1"></i> Add Link</button>
                        </div>
                    </div>
                    <textarea id="post-content" rows="12" placeholder="Write your article text here. HTML tags are supported." class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-white font-mono text-sm"></textarea>
                </div>

                <div class="pt-2">
                    <button onclick="savePost()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg flex items-center justify-center">
                        <i class="fa-solid fa-cloud-arrow-up mr-2"></i> Save Article Locally
                    </button>
                </div>
            </div>
        </div>

        <div class="space-y-6">
            <div class="bg-slate-950 border border-slate-800 rounded-2xl p-6 space-y-4 shadow-xl">
                <h3 class="text-base font-extrabold tracking-tight border-b border-slate-800 pb-3 text-slate-200 flex items-center"><i class="fa-solid fa-folder-tree mr-2 text-emerald-400"></i> Active Index Items</h3>
                <div id="admin-posts-list" class="space-y-3 max-h-[400px] overflow-y-auto pr-1">
                    </div>
            </div>

            <div class="bg-gradient-to-br from-emerald-950/20 to-slate-950 border border-slate-800 rounded-2xl p-6 space-y-3 shadow-xl">
                <h4 class="text-sm font-bold text-emerald-400 uppercase tracking-widest flex items-center"><i class="fa-solid fa-circle-nodes mr-2"></i> Sync To GitHub Pages</h4>
                <p class="text-xs text-slate-400 leading-relaxed">Copy the database state payload below into your index.html file default variables to lock down changes globally.</p>
                <button onclick="exportJSONDataState()" class="w-full bg-emerald-900/40 hover:bg-emerald-900/60 border border-emerald-700/50 text-emerald-200 text-xs font-bold py-2 rounded-xl transition flex items-center justify-center">
                    <i class="fa-solid fa-copy mr-1.5"></i> Export Database State
                </button>
            </div>
        </div>
    </main>

    <script>
        function getPosts() {
            let data = localStorage.getItem('insights_blog_posts');
            if(!data) return [];
            return JSON.stringify(data).startsWith('[') || JSON.stringify(data).startsWith('"') ? JSON.parse(data) : [];
        }

        function setFormattedDate() {
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('post-date').value = new Date().toLocaleDateString('en-US', options);
        }

        function renderAdminList() {
            const posts = getPosts();
            const container = document.getElementById('admin-posts-list');
            container.innerHTML = '';

            if(posts.length === 0) {
                container.innerHTML = `<p class="text-xs text-slate-500 text-center py-4">No active content blocks inside index registry.</p>`;
                return;
            }

            posts.forEach(post => {
                container.innerHTML += `
                    <div class="bg-slate-900 p-4 rounded-xl border border-slate-800/80 flex items-center justify-between gap-4">
                        <div class="space-y-1 min-w-0">
                            <h5 class="text-xs font-bold text-white tracking-tight truncate">${post.title}</h5>
                            <span class="text-[10px] font-mono text-slate-500 block">${post.category} | ${post.date}</span>
                        </div>
                        <button onclick="deletePost(${post.id})" class="text-slate-500 hover:text-red-400 transition text-sm p-1">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                `;
            });
        }

        function injectHTML(openTag, closeTag) {
            const textarea = document.getElementById('post-content');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const text = textarea.value;
            textarea.value = text.substring(0, start) + openTag + text.substring(start, end) + closeTag + text.substring(end);
            textarea.focus();
        }

        function injectCustomLink() {
            const url = prompt("Enter the complete destination URL:");
            if(!url) return;
            const text = prompt("Enter the hyperlinked display text:");
            if(!text) return;
            const targetAnchorHtml = `<a href="${url}" target="_blank" class="text-emerald-600 font-bold underline hover:text-emerald-700">${text}</a>`;
            const textarea = document.getElementById('post-content');
            const currentPos = textarea.selectionStart;
            textarea.value = textarea.value.substring(0, currentPos) + targetAnchorHtml + textarea.value.substring(currentPos);
            textarea.focus();
        }

        function savePost() {
            const title = document.getElementById('post-title').value.trim();
            const category = document.getElementById('post-category').value;
            const date = document.getElementById('post-date').value.trim();
            const summary = document.getElementById('post-summary').value.trim();
            const content = document.getElementById('post-content').value.trim();

            if(!title || !summary || !content) {
                alert('Please fill in all parameter fields before saving.');
                return;
            }

            let posts = getPosts();
            const newPost = { id: Date.now(), title, category, date, summary, content };

            posts.unshift(newPost);
            localStorage.setItem('insights_blog_posts', JSON.stringify(posts));
            
            document.getElementById('post-title').value = '';
            document.getElementById('post-summary').value = '';
            document.getElementById('post-content').value = '';
            
            renderAdminList();
            alert('Success: Article saved locally.');
        }

        function deletePost(id) {
            if(confirm('Are you sure you want to delete this article?')) {
                let posts = getPosts();
                posts = posts.filter(p => p.id !== id);
                localStorage.setItem('insights_blog_posts', JSON.stringify(posts));
                renderAdminList();
            }
        }

        function exportJSONDataState() {
            const state = localStorage.getItem('insights_blog_posts');
            navigator.clipboard.writeText(state).then(() => {
                alert("Database state string copied directly to clipboard! Paste this array block over the variable 'DEFAULT_POSTS' inside your index.html file to save your articles permanently.");
            });
        }

        window.onload = function() {
            setFormattedDate();
            renderAdminList();
        }
    </script>
</body>
</html>
