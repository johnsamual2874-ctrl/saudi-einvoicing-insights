<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compliance Guide Viewer | Saudi E-Invoicing Insights</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030712; color: #f3f4f6; }
        .glass-panel { background: rgba(15, 23, 42, 0.45); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-nav { background: rgba(3, 7, 18, 0.7); backdrop-filter: blur(20px); border-b: 1px solid rgba(255, 255, 255, 0.05); }
        .rendered-content h3 { font-size: 1.4rem; font-weight: 700; color: #ffffff; margin-top: 1.75rem; margin-bottom: 0.75rem; }
        .rendered-content p { color: #9ca3af; margin-bottom: 1.25rem; line-height: 1.8; text-align: justify; font-weight: 300; }
        .rendered-content strong { color: #10b981; font-weight: 600; }
        .rendered-content a { color: #10b981; text-decoration: underline; font-weight: 500; }
    </style>
</head>
<body class="antialiased flex flex-col min-h-screen">

    <header class="glass-nav sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <!-- FIXED: Relative link navigation points out to the site root directory folder -->
            <div class="flex items-center space-x-3.5 group cursor-pointer" onclick="window.location.href='../index.html'">
                <div class="bg-gradient-to-br from-emerald-500 to-teal-600 p-2.5 rounded-xl text-slate-950"><i class="fa-solid fa-server text-lg"></i></div>
                <div>
                    <span class="text-lg font-black tracking-tight text-white block">Saudi E-Invoicing</span>
                    <span class="text-[10px] font-extrabold text-emerald-400 uppercase tracking-widest block -mt-0.5">Intelligence Hub</span>
                </div>
            </div>
            <nav class="flex items-center space-x-1 bg-slate-900/60 p-1.5 rounded-xl border border-white/5">
                <!-- FIXED: Stepped navigation links out one level up -->
                <a href="../index.html" class="px-4 py-2 text-xs sm:text-sm font-semibold rounded-lg text-slate-400 hover:text-white transition">Home</a>
                <a href="../blog.html" class="px-4 py-2 text-xs sm:text-sm font-semibold rounded-lg text-slate-400 hover:text-white transition">Knowledge Base</a>
            </nav>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex-1 w-full">
        <!-- FIXED: Stepped path out to feed archive file -->
        <a href="../blog.html" class="mb-8 inline-flex items-center font-bold text-xs text-slate-400 hover:text-white transition bg-slate-900 border border-white/5 px-4 py-2.5 rounded-xl shadow-sm"><i class="fa-solid fa-chevron-left mr-2 text-[10px]"></i> Return to Archive Feed</a>
        
        <div id="error-fallback-view" class="hidden text-center py-12 glass-panel rounded-2xl border border-white/5"><i class="fa-solid fa-triangle-exclamation text-red-400 text-3xl mb-2 block"></i><p class="text-sm text-slate-400">Target document reference identity missing from workspace nodes.</p></div>

        <article id="article-view-core" class="glass-panel rounded-3xl p-6 md:p-14 shadow-2xl relative hidden">
            <div class="space-y-4 border-b border-slate-800 pb-8 mb-8">
                <span id="article-view-category" class="bg-emerald-500/10 text-emerald-400 text-[10px] font-extrabold uppercase tracking-widest px-3 py-1 rounded-md border border-emerald-500/20 inline-block">Category</span>
                <h1 id="article-view-title" class="text-2xl md:text-4xl font-black text-white tracking-tight leading-tight">Article Title</h1>
                <div class="flex items-center gap-4 text-xs text-slate-500 pt-2 font-medium">
                    <span id="article-view-date"><i class="fa-solid fa-calendar mr-1.5"></i> Date</span>
                    <span><i class="fa-solid fa-user-shield mr-1.5"></i> Systems Auditor</span>
                </div>
            </div>
            <div id="article-view-content" class="rendered-content text-slate-300 text-base md:text-lg tracking-normal font-light">
            </div>
        </article>
    </main>

    <footer class="bg-slate-950 text-slate-500 border-t border-white/5 py-8 text-center text-xs">
        <p>&copy; 2026 Saudi E-Invoicing Insights Hub. Independent Information Channel.</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDTbAZ1-8IQdNESIZ0Sg9Si3bGD0jL5D-M",
            authDomain: "saudi-einvoicing-insights.firebaseapp.com",
            projectId: "saudi-einvoicing-insights",
            storageBucket: "saudi-einvoicing-insights.firebasestorage.app",
            messagingSenderId: "229055730751",
            appId: "1:229055730751:web:003941a6465e368c31948a",
            measurementId: "G-92M22ZP5JH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // =========================================================================
        // CHANGE THIS SLUG FOR EACH UNIQUE SUBFOLDER INDEX.HTML YOU CREATE
        // =========================================================================
        const currentSlug = "how-enterprises-can-simplify-complex-financial-compliance-requirements";

        async function loadTargetArticleDocument() {
            if(!currentSlug) {
                document.getElementById('error-fallback-view').classList.remove('hidden');
                return;
            }

            try {
                // Optimized query selector filters parameters instantly out from Firestore records
                const q = query(collection(db, "posts"), where("slug", "==", currentSlug));
                const querySnapshot = await getDocs(q);
                let matchedPost = null;

                querySnapshot.forEach((doc) => {
                    matchedPost = doc.data();
                });

                if(matchedPost) {
                    document.getElementById('article-view-title').innerText = matchedPost.title;
                    document.getElementById('article-view-category').innerText = matchedPost.category;
                    document.getElementById('article-view-date').innerHTML = `<i class="fa-solid fa-calendar mr-1.5 text-slate-600"></i> ${matchedPost.date}`;
                    document.getElementById('article-view-content').innerHTML = matchedPost.content;
                    
                    document.getElementById('article-view-core').classList.remove('hidden');
                    document.title = `${matchedPost.title} | Saudi E-Invoicing Insights`;
                } else {
                    document.getElementById('error-fallback-view').classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                document.getElementById('error-fallback-view').classList.remove('hidden');
            }
        }
        window.onload = loadTargetArticleDocument;
    </script>
</body>
</html>
