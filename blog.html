<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="ktq2b1yaZdNoPorObnbGl4_QfX9Od36k4AZKYvnGDpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compliance Archive | Saudi E-Invoicing Insights</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030712; color: #f3f4f6; }
        .glass-panel { background: rgba(15, 23, 42, 0.45); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-nav { background: rgba(3, 7, 18, 0.7); backdrop-filter: blur(20px); border-b: 1px solid rgba(255, 255, 255, 0.05); }
        .interactive-card { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .interactive-card:hover { transform: translateY(-6px); border-color: rgba(16, 185, 129, 0.3); box-shadow: 0 20px 40px -15px rgba(16, 185, 129, 0.1); }
    </style>
</head>
<body class="antialiased flex flex-col min-h-screen">

    <header class="glass-nav sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <div class="flex items-center space-x-3.5 group cursor-pointer" onclick="window.location.href='index.html'">
                <div class="bg-gradient-to-br from-emerald-500 to-teal-600 p-2.5 rounded-xl text-slate-950"><i class="fa-solid fa-server text-lg"></i></div>
                <div>
                    <span class="text-lg font-black tracking-tight text-white block">Saudi E-Invoicing</span>
                    <span class="text-[10px] font-extrabold text-emerald-400 uppercase tracking-widest block -mt-0.5">Intelligence Hub</span>
                </div>
            </div>
            <nav class="flex items-center space-x-1 bg-slate-900/60 p-1.5 rounded-xl border border-white/5">
                <a href="index.html" class="px-4 py-2 text-xs sm:text-sm font-semibold rounded-lg text-slate-400 hover:text-white transition">Home</a>
                <a href="blog.html" class="px-4 py-2 text-xs sm:text-sm font-semibold rounded-lg text-emerald-400 bg-emerald-500/10">Knowledge Base</a>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex-1 w-full space-y-10">
        <div class="max-w-2xl border-l-2 border-emerald-500 pl-4 space-y-1">
            <h1 class="text-3xl font-black text-white tracking-tight">The Compliance Archive</h1>
            <p class="text-sm text-slate-400 font-light">Searchable technical documentation, wave adjustments, and configuration logs.</p>
        </div>

        <div id="all-posts-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-12 text-slate-500"><i class="fa-solid fa-circle-notch animate-spin text-2xl text-emerald-500 block mx-auto mb-2"></i> Syncing Node Collections...</div>
        </div>
    </main>

    <footer class="bg-slate-950 text-slate-500 border-t border-white/5 py-8 text-center text-xs">
        <p>&copy; 2026 Saudi E-Invoicing Insights Hub. Independent Information Channel.</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDTbAZ1-8IQdNESIZ0Sg9Si3bGD0jL5D-M",
            authDomain: "saudi-einvoicing-insights.firebaseapp.com",
            projectId: "saudi-einvoicing-insights",
            storageBucket: "saudi-einvoicing-insights.firebasestorage.app",
            messagingSenderId: "229055730751",
            appId: "1:229055730751:web:003941a6465e368c31948a",
            measurementId: "G-92M22ZP5JH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function renderArchiveFeed() {
            try {
                const querySnapshot = await getDocs(query(collection(db, "posts"), orderBy("id", "desc")));
                const grid = document.getElementById('all-posts-grid');
                grid.innerHTML = '';

                if(querySnapshot.empty) {
                    grid.innerHTML = `<div class="col-span-full text-center text-slate-500 text-sm py-12"><i class="fa-solid fa-box-open text-2xl mb-2 block"></i> No indexed records found.</div>`;
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const post = doc.data();
                    // Fallback to title conversion if explicit slug parameter field value was left blank in document node
                    const targetSlug = post.slug || post.title.toLowerCase().replace(/[^a-z0-9\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-');
                    
                    grid.innerHTML += `
                        <div class="glass-panel rounded-2xl p-6 flex flex-col justify-between interactive-card">
                            <div class="space-y-3.5">
                                <span class="bg-emerald-500/10 text-emerald-400 text-[9px] font-extrabold uppercase tracking-widest px-2.5 py-1 rounded-md border border-emerald-500/15 inline-block">${post.category}</span>
                                <h3 class="text-lg font-bold text-white tracking-tight hover:text-emerald-400 cursor-pointer transition line-clamp-2" onclick="window.location.href='post.html?article=${targetSlug}'">${post.title}</h3>
                                <p class="text-slate-400 text-xs font-light leading-relaxed line-clamp-3">${post.summary}</p>
                            </div>
                            <div class="pt-5 mt-5 border-t border-white/5 flex items-center justify-between text-[11px] font-medium text-slate-500">
                                <span><i class="fa-solid fa-calendar-days mr-1 text-slate-600"></i> ${post.date}</span>
                                <a href="post.html?article=${targetSlug}" class="text-emerald-400 font-bold hover:text-emerald-300 flex items-center gap-1 transition">Analyze Guide <i class="fa-solid fa-chevron-right text-[9px]"></i></a>
                            </div>
                        </div>`;
                });
            } catch (err) {
                console.error(err);
            }
        }
        window.onload = renderArchiveFeed;
    </script>
</body>
</html>
